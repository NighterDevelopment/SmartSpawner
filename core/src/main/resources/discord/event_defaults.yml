# ──────────────────────────────────────────────────────────────────────────────
#  Default Discord embed templates for every SmartSpawner event type.
#
#  These entries are extracted to  plugins/SmartSpawner/discord/events/<EVENT>.yml
#  the first time Discord logging is enabled.  Edit the individual files there
#  to customise each event's appearance.
#
#  Supported placeholders (common to all events):
#    {player}        – Player name  (N/A for console / explosion events)
#    {player_uuid}   – Player UUID
#    {description}   – Human-readable event description
#    {event_type}    – Raw event name (e.g. SPAWNER_PLACE)
#    {time}          – HH:mm:ss
#    {timestamp}     – ISO 8601  (Discord native date field)
#    {location}      – "world (x, y, z)"
#    {world} {x} {y} {z}
#    {entity}        – Mob / entity name
#    {color}         – Decimal colour integer for this event
#    + any metadata key logged by the event (see each file for specifics)
# ──────────────────────────────────────────────────────────────────────────────

SPAWNER_PLACE:
  embed_format: yaml
  embed:
    title: "✅ Spawner Placed"
    description: "**{player}** placed a **{entity}** spawner"
    color: "57F287"
    footer: "SmartSpawner • {time}"
    fields:
      - name: "📍 Location"
        value: "`{location}`"
        inline: false
      - name: "🐾 Entity"
        value: "`{entity}`"
        inline: true
      - name: "🔢 Quantity"
        value: "`{quantity}`"
        inline: true

