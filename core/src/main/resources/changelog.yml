# ──────────────────────────────────────────────────────────────────────────────
#   SmartSpawner – Centralized Changelog
# ──────────────────────────────────────────────────────────────────────────────
#
#   This file is the single source of truth for version history.
#   It is auto-updated by the Gradle `generateChangelog` task each time a build
#   is compiled with a version that is higher than the latest published GitHub
#   release.
#
#   The file is bundled inside the plugin JAR and readable at runtime via
#   ChangelogService (get the latest release notes, compare URLs, etc.).
#
#   Entry format
#   ─────────────
#   versions:
#     "X.Y.Z":
#       date:        YYYY-MM-DD
#       tag:         vX.Y.Z
#       compare_url: GitHub diff link between the previous and this version
#       changes:
#         - type:        added | changed | fixed | removed | security | improvement
#           description: human-readable description of the change
#           files:       (optional) source-code locations where the change lives
#             - path: relative path from repo root
#               line: 1-based line number of the key/symbol affected
#
# ──────────────────────────────────────────────────────────────────────────────

# ── GitHub Repository Reference ───────────────────────────────────────────────
github:
  owner: "NighterDevelopment"
  repo:  "SmartSpawner"
  url:          "https://github.com/NighterDevelopment/SmartSpawner"
  releases_url: "https://github.com/NighterDevelopment/SmartSpawner/releases"
  api_latest:   "https://api.github.com/repos/NighterDevelopment/SmartSpawner/releases/latest"

