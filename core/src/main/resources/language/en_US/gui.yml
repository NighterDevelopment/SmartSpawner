#                  Main GUI
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
gui_title_main:
  single_spawner: '&#545454{бҙҮЙҙбҙӣЙӘбҙӣКҸ} кңұбҙҳбҙҖбҙЎЙҙбҙҮКҖ'
  stacked_spawner: '&#545454{amount} {бҙҮЙҙбҙӣЙӘбҙӣКҸ} кңұбҙҳбҙҖбҙЎЙҙбҙҮКҖкңұ'

spawner_storage_item:
  # Available placeholders for name:
  # {max_slots} - Maximum number of slots in the storage (formatted with commas)
  # {current_items} - Current number of items in the storage
  # {percent_storage_rounded} - Percentage of storage used (0-100)
  # {entity} - The spawner's entity type (normal capitalization)
  # {бҙҮЙҙбҙӣЙӘбҙӣКҸ} - The spawner's entity type (small caps)
  name: '&#e67e22кңұбҙҳбҙҖбҙЎЙҙбҙҮКҖ кңұбҙӣбҙҸКҖбҙҖЙўбҙҮ'

  # Available placeholders for all lore lines:
  # {max_slots} - Maximum number of slots in the storage (formatted with commas)
  # {current_items} - Current number of items in the storage
  # {percent_storage_rounded} - Percentage of storage used (0-100)
  # {loot_items} - The complete formatted list of loot items
  # {entity} - The spawner's entity type (normal capitalization)
  # {бҙҮЙҙбҙӣЙӘбҙӣКҸ} - The spawner's entity type (small caps)
  lore:
    - ''
    - '&#e67e22в—Ҳ &#ecf0f1кңұбҙӣбҙҖбҙӣкңұ:'
    - '  &#bdc3c7вҖў  кңұКҹбҙҸбҙӣкңұ: &#e67e22{current_items} &#bdc3c7/ &#e67e22{max_slots}'
    - '  &#bdc3c7вҖў  кңұбҙӣбҙҸКҖбҙҖЙўбҙҮ: &#e67e22{percent_storage_rounded}% &#bdc3c7кң°бҙңКҹКҹ'
    - ''
    - '&#e67e22вҠі &#ecf0f1бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙҸбҙҳбҙҮЙҙ кңұбҙӣбҙҸКҖбҙҖЙўбҙҮ'
    # You can add an optional line to display all loot items.
    # - '{loot_items}'

  # This defines how each loot item will be displayed when using {loot_items}
  # Available placeholders for each loot item:
  # {item_name} - The name of the item (normal capitalization)
  # {amount} - Number of items (formatted with commas)
  # {raw_amount} - Number of items (without formatting)
  # {chance} - The chance of this item dropping (with % symbol, e.g. "8.5%")
  loot_items: '  &#bdc3c7вҖў  &#2ecc71{amount} &#bdc3c7{item_name}'
  loot_items_empty: '  &#bdc3c7вҖў  ЙҙбҙҸЙҙбҙҮ'


# Available placeholders:
# {entity}           - Formatted entity name (e.g., "Zombie")
# {бҙҮЙҙбҙӣЙӘбҙӣКҸ}           - Entity name in small caps (e.g., "бҙўбҙҸбҙҚКҷЙӘбҙҮ")
# {stack_size}       - Number of spawners stacked at this location
# {range}            - Spawning range in blocks
# {delay}            - Spawn delay in seconds
# {min_mobs}         - Minimum number of mobs to spawn
# {max_mobs}         - Maximum number of mobs to spawn
# {current_items}    - Current number of items stored
# {max_items}        - Maximum storage capacity for items
# {percent_storage_rounded}  - Storage usage as integer percentage (e.g., "87")
# {percent_storage_decimal} - Storage usage as formatted percentage with decimal (e.g., "87.5")
# {current_exp}      - Current experience stored (formatted with commas)
# {max_exp}          - Maximum experience capacity (formatted with commas)
# {raw_current_exp}  - Raw current experience number
# {raw_max_exp}      - Raw maximum experience number
# {percent_exp_rounded}      - Experience storage as integer percentage
# {percent_exp_decimal}    - Experience storage as formatted percentage with decimal (e.g., "42.7")
spawner_info_item:
  name: '&#3498db{бҙҮЙҙбҙӣЙӘбҙӣКҸ} кңұбҙҳбҙҖбҙЎЙҙбҙҮКҖ'
  lore:
    - ''
    - '&#3498dbв—Ҳ &#ecf0f1ЙӘЙҙкң°бҙҸКҖбҙҚбҙҖбҙӣЙӘбҙҸЙҙ:'
    - '  &#bdc3c7вҖў  кңұбҙӣбҙҖбҙ„бҙӢ: &#3498db{stack_size}'
    - '  &#bdc3c7вҖў  КҖбҙҖЙҙЙўбҙҮ: &#3498db{range} &#bdc3c7КҷКҹбҙҸбҙ„бҙӢкңұ'
    - '  &#bdc3c7вҖў  бҙҚбҙҸКҷкңұ: &#3498db{min_mobs} &#bdc3c7- &#3498db{max_mobs}'
    - '  &#bdc3c7вҖў  бҙ…бҙҮКҹбҙҖКҸ: &#3498db{delay} &#bdc3c7кңұ'
    - '  &#bdc3c7вҖў  ЙҙбҙҮxбҙӣ кңұбҙҳбҙҖбҙЎЙҙ: &#3498db{time}'
    - '  &#bdc3c7вҖў  кңұбҙҮКҹКҹбҙҖКҷКҹбҙҮ: &a+${total_sell_price}'
    - ''
    - '&#3498dbвҠі &#ecf0f1КҖЙӘЙўКңбҙӣ-бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙҸбҙҳбҙҮЙҙ &#3498dbкңұбҙӣбҙҖбҙ„бҙӢбҙҮКҖ ЙўбҙңЙӘ'
    - '&#3498dbвҠі &#ecf0f1бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ &#e67e22кңұбҙҮКҹКҹ ЙӘбҙӣбҙҮбҙҚкңұ &#ecf0f1& &#2ecc71бҙ„бҙҸКҹКҹбҙҮбҙ„бҙӣ xбҙҳ'

  lore_no_shop:
    - ''
    - '&#3498dbв—Ҳ &#ecf0f1ЙӘЙҙкң°бҙҸКҖбҙҚбҙҖбҙӣЙӘбҙҸЙҙ:'
    - '  &#bdc3c7вҖў  кңұбҙӣбҙҖбҙ„бҙӢ: &#3498db{stack_size}'
    - '  &#bdc3c7вҖў  КҖбҙҖЙҙЙўбҙҮ: &#3498db{range} &#bdc3c7КҷКҹбҙҸбҙ„бҙӢкңұ'
    - '  &#bdc3c7вҖў  бҙҚбҙҸКҷкңұ: &#3498db{min_mobs} &#bdc3c7- &#3498db{max_mobs}'
    - '  &#bdc3c7вҖў  бҙ…бҙҮКҹбҙҖКҸ: &#3498db{delay} &#bdc3c7кңұ'
    - '  &#bdc3c7вҖў  ЙҙбҙҮxбҙӣ кңұбҙҳбҙҖбҙЎЙҙ: &#3498db{time}'
    - ''
    - '&#3498dbвҠі &#ecf0f1бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙҸбҙҳбҙҮЙҙ &#3498dbкңұбҙӣбҙҖбҙ„бҙӢбҙҮКҖ ЙўбҙңЙӘ'

  lore_full: '&#ff5252кңұбҙӣбҙҸКҖбҙҖЙўбҙҮ & бҙҮxбҙҳ ЙӘкңұ кң°бҙңКҹКҹ!'
  lore_inactive: '&#ff3333кңұбҙҳбҙҖбҙЎЙҙбҙҮКҖ ЙӘкңұ ЙӘЙҙбҙҖбҙ„бҙӣЙӘбҙ бҙҮ!'
  lore_no_loot: '&#ff3333ЙҙбҙҸ КҹбҙҸбҙҸбҙӣ бҙ„бҙҸЙҙкң°ЙӘЙўбҙңКҖбҙҮбҙ…'

exp_info_item:
  name: '&#2ecc71бҙҮxбҙҳбҙҮКҖЙӘбҙҮЙҙбҙ„бҙҮ: &#f8f8ff{current_exp}'
  lore:
    - ''
    - '&#2ecc71в—Ҳ &#ecf0f1кңұбҙӣбҙҖбҙӣкңұ:'
    - '  &#bdc3c7вҖў  бҙ„бҙңКҖКҖбҙҮЙҙбҙӣ: &#2ecc71{current_exp} &#bdc3c7/ &#2ecc71{max_exp} &#2ecc71xбҙҳ'
