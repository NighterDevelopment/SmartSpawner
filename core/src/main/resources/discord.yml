# ──────────────────────────────────────────────────────────────────────────────
#   SmartSpawner – Discord Webhook Configuration
# ──────────────────────────────────────────────────────────────────────────────
#
#   This file controls how spawner events are forwarded to Discord via webhooks.
#   Logging must also be enabled in config.yml (logging.enabled: true) for any
#   events to be generated.
#
#   HOW TO CREATE A WEBHOOK:
#     1. Open your Discord server settings.
#     2. Go to "Integrations" → "Webhooks" → "New Webhook".
#     3. Choose the target channel, copy the URL and paste it below.
# ──────────────────────────────────────────────────────────────────────────────

# Enable / disable Discord webhook delivery.
enabled: false

# The webhook URL obtained from Discord (required when enabled is true).
webhook_url: ""

# Show the acting player's Minecraft head as the embed thumbnail.
show_player_head: true

# ──────────────────────────────────────────────────────────────────────────────
#   Event Filtering
# ──────────────────────────────────────────────────────────────────────────────

# If true, every logged event is forwarded to Discord (logged_events list below
# is ignored when this is true).
log_all_events: false

# Specific events to forward when log_all_events is false.
# Available event names:
#   SPAWNER_PLACE, SPAWNER_BREAK, SPAWNER_EXPLODE
#   SPAWNER_STACK_HAND, SPAWNER_STACK_GUI, SPAWNER_DESTACK_GUI
#   SPAWNER_GUI_OPEN, SPAWNER_STORAGE_OPEN, SPAWNER_STACKER_OPEN
#   SPAWNER_EXP_CLAIM, SPAWNER_SELL_ALL
#   SPAWNER_ITEM_TAKE_ALL, SPAWNER_ITEM_DROP, SPAWNER_ITEMS_SORT
#   SPAWNER_ITEM_FILTER, SPAWNER_DROP_PAGE_ITEMS
#   SPAWNER_EGG_CHANGE
#   COMMAND_EXECUTE_PLAYER, COMMAND_EXECUTE_CONSOLE, COMMAND_EXECUTE_RCON
logged_events:
  - SPAWNER_PLACE
  - SPAWNER_BREAK
  - SPAWNER_EXPLODE
  - SPAWNER_STACK_HAND
  - SPAWNER_STACK_GUI
  - SPAWNER_DESTACK_GUI
  - SPAWNER_GUI_OPEN
  - COMMAND_EXECUTE_PLAYER
  - COMMAND_EXECUTE_CONSOLE
  - COMMAND_EXECUTE_RCON

# ──────────────────────────────────────────────────────────────────────────────
#   Embed Appearance
# ──────────────────────────────────────────────────────────────────────────────
#
#   embed_format controls which configuration block is used:
#     yaml  – Use the structured "embed:" block below (easier, recommended).
#     json  – Use the "embed_json:" template for full Discord embed control.
# ──────────────────────────────────────────────────────────────────────────────
embed_format: yaml

# ── YAML embed settings (used when embed_format: yaml) ────────────────────────
embed:
  # Title of the embed. Supports placeholders.
  title: "{description}"

  # Main body of the embed. Supports placeholders.
  description: "{description}"

  # Footer text shown at the bottom of every embed.
  footer: "SmartSpawner • {time}"

  # Per-event hex colour codes (without the leading #).
  # Add or remove entries freely; unknown events fall back to DEFAULT.
  colors:
    # Command Events – Blue shades
    COMMAND_EXECUTE_PLAYER: "5865F2"    # Discord Blurple
    COMMAND_EXECUTE_CONSOLE: "3B5998"   # Dark Blue
    COMMAND_EXECUTE_RCON: "7289DA"      # Light Blurple

    # Spawner lifecycle – Green / Red
    SPAWNER_PLACE: "57F287"             # Green  (success)
    SPAWNER_BREAK: "ED4245"             # Red    (destructive)
    SPAWNER_EXPLODE: "FF6B6B"           # Light Red (danger)

    # Stack operations – Yellow / Orange
    SPAWNER_STACK_HAND: "FEE75C"        # Yellow
    SPAWNER_STACK_GUI: "F1C40F"         # Gold
    SPAWNER_DESTACK_GUI: "E67E22"       # Orange

    # GUI interactions – Purple shades
    SPAWNER_GUI_OPEN: "9B59B6"          # Purple
    SPAWNER_STORAGE_OPEN: "8E44AD"      # Dark Purple
    SPAWNER_STACKER_OPEN: "BB8FCE"      # Light Purple

    # Economy / XP – Green shades
    SPAWNER_EXP_CLAIM: "2ECC71"         # Emerald Green
    SPAWNER_SELL_ALL: "27AE60"          # Dark Green

    # Item management – Cyan / Teal
    SPAWNER_ITEM_TAKE_ALL: "1ABC9C"     # Turquoise
    SPAWNER_ITEM_DROP: "16A085"         # Dark Turquoise
    SPAWNER_ITEMS_SORT: "48C9B0"        # Light Teal
    SPAWNER_ITEM_FILTER: "45B7AF"       # Teal
    SPAWNER_DROP_PAGE_ITEMS: "138D75"   # Dark Teal

    # Entity type changes – Pink
    SPAWNER_EGG_CHANGE: "E91E63"        # Pink

    # Fallback colour used for any event not listed above
    DEFAULT: "99AAB5"                   # Grey

  # Optional extra fields appended to every embed (supports placeholders).
  # Example:
  #   fields:
  #     - name: "Server"
  #       value: "Production"
  #       inline: true
  #     - name: "Action Time"
  #       value: "{time}"
  #       inline: false
  fields: []

# ── JSON embed template (used when embed_format: json) ────────────────────────
#
#   Paste a full Discord webhook JSON payload here.  The plugin will replace all
#   placeholders before sending.  This gives you complete control over the embed
#   structure, including multiple embeds, author fields, images, etc.
#
#   Supported placeholders:
#     {player}        – Acting player's name  (or "N/A" for console events)
#     {player_uuid}   – Acting player's UUID
#     {description}   – Human-readable event description
#     {event_type}    – Raw event name  (e.g. SPAWNER_PLACE)
#     {time}          – Formatted time  (HH:mm:ss)
#     {timestamp}     – ISO 8601 timestamp for Discord's native date field
#     {location}      – "world (x, y, z)"
#     {world}         – World name
#     {x} {y} {z}     – Integer coordinates
#     {entity}        – Mob / entity name
#     {color}         – Decimal colour integer for this event type
#     Any metadata key returned by the event (e.g. {stack_size}, {amount}, …)
#
#   NOTE: All string values must be valid JSON.  Use \n for newlines inside
#         JSON strings.  Do NOT use actual newlines inside a JSON string value.
# ──────────────────────────────────────────────────────────────────────────────
embed_json: |
  {
    "embeds": [
      {
        "title": "🔔 {event_type}",
        "description": "{description}\n\n👤 `{player}` • 📍 `{location}`",
        "color": {color},
        "footer": {
          "text": "SmartSpawner • {time}"
        },
        "timestamp": "{timestamp}"
      }
    ]
  }

